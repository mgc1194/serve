[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (unused imports, undefined names, etc.)
    "I",   # isort (import ordering)
    "B",   # flake8-bugbear (likely bugs and design issues)
    "C4",  # flake8-comprehensions (unnecessary comprehensions)
    "UP",  # pyupgrade (modernise Python syntax)
    "DJ",  # flake8-django (Django-specific checks)
    "RUF", # Ruff-native rules
]
ignore = [
    "E501",   # line too long — handled by the formatter, not the linter
    "RUF012", # mutable class attributes — conflicts with Django model field declarations
]

[tool.ruff.lint.isort]
known-first-party = ["api", "config", "schemas", "transactions", "users"]
known-third-party = ["ninja", "django"]

[tool.ruff.lint.per-file-ignores]
# Migrations are auto-generated — ignore style and unused-import warnings.
"*/migrations/*.py" = ["E501", "F401"]
# Test files use fixtures that appear unused to the linter.
"tests/**/*.py" = ["F811"]
"*/tests/**/*.py" = ["F811"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"