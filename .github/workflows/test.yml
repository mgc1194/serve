name: Tests

on:
  pull_request:
    branches: [ "**" ]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_budget
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Set up test database
        env:
          MYSQL_PWD: root
        run: |
          mysql -h 127.0.0.1 -u root -e "CREATE DATABASE IF NOT EXISTS test_serve;"
          mysql -h 127.0.0.1 -u root -e "CREATE USER IF NOT EXISTS 'serve'@'%' IDENTIFIED BY 'test_password';"
          mysql -h 127.0.0.1 -u root -e "GRANT ALL PRIVILEGES ON test_serve.* TO 'serve'@'%';"
          mysql -h 127.0.0.1 -u root -e "GRANT CREATE ON *.* TO 'serve'@'%';"
          mysql -h 127.0.0.1 -u root -e "FLUSH PRIVILEGES;"

      - name: Run Django migrations
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: "False"
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: test_serve
          DB_USER: serve
          DB_PASSWORD: test_password
        run: pytest manage.py migrate --noinput && pytest -v
    
      - name: Run Django tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: "False"
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: test_serve
          DB_USER: serve
          DB_PASSWORD: test_password
        run: pytest -v

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 18
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Insall pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: pnpm tsc --noEmit
      
      - name: Lint code
        working-directory: frontend
        run: pnpm lint

      - name: Run tests
        working-directory: frontend
        run: pnpm test --run
